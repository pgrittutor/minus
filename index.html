<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integer Math Game</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap');
        body {
            font-family: 'Sarabun', sans-serif;
        }
        /* ซ่อน Element โดยสมบูรณ์เพื่อป้องกันบั๊ก Flex/Hidden ชนกัน */
        .force-hidden {
            display: none !important;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 flex flex-col items-center justify-center p-4 text-slate-800">

    <!-- 1. หน้าตั้งค่าก่อนเริ่มเกม -->
    <div id="settings-screen" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 flex flex-col items-center space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-black text-indigo-600 mb-2">เกมฝึกลบเลข</h1>
            <p class="text-slate-500">จำนวนเต็ม (ม.1) • จำกัด 10 ข้อ</p>
        </div>

        <div class="w-full">
            <h2 class="text-lg font-bold text-slate-700 mb-4 text-center">ตั้งค่าเวลาต่อข้อ</h2>
            <div class="grid grid-cols-2 gap-4">
                <button id="btn-time-5" onclick="selectTime(5, 'btn-time-5')" class="time-btn w-full bg-indigo-100 border-2 border-indigo-500 text-indigo-700 ring-2 ring-indigo-200 py-3 rounded-xl font-bold transition-all transform scale-105">
                    5 วินาที
                </button>
                <button id="btn-time-10" onclick="selectTime(10, 'btn-time-10')" class="time-btn w-full bg-slate-50 border-2 border-slate-200 text-slate-600 py-3 rounded-xl font-bold hover:bg-indigo-50 transition-all">
                    10 วินาที
                </button>
                <button id="btn-time-15" onclick="selectTime(15, 'btn-time-15')" class="time-btn w-full bg-slate-50 border-2 border-slate-200 text-slate-600 py-3 rounded-xl font-bold hover:bg-indigo-50 transition-all">
                    15 วินาที
                </button>
                <button id="btn-time-0" onclick="selectTime(0, 'btn-time-0')" class="time-btn w-full bg-slate-50 border-2 border-slate-200 text-slate-600 py-3 rounded-xl font-bold hover:bg-indigo-50 transition-all">
                    ไม่จับเวลา
                </button>
            </div>
        </div>

        <button onclick="startGame()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-4 rounded-xl font-bold text-xl hover:opacity-90 transition-opacity shadow-lg mt-4 flex items-center justify-center space-x-2">
            <i data-lucide="play" class="w-6 h-6"></i>
            <span>เริ่มเกมเลย!</span>
        </button>
    </div>

    <!-- 2. หน้าจอเกมเพลย์ -->
    <div id="game-screen" class="force-hidden w-full max-w-md flex-col items-center">
        <!-- แถบสถานะด้านบน: จำนวนข้อ, คะแนน, คอมโบ -->
        <div class="w-full bg-white rounded-2xl shadow-sm p-4 mb-4 flex justify-between items-center relative z-10">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">สถานะ</span>
                <div class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                    <span id="question-counter">ข้อที่ 1 / 10</span>
                </div>
            </div>
            <div class="flex space-x-4">
                <div class="flex flex-col items-center justify-center">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">คะแนน</span>
                    <div class="flex items-center space-x-1 text-indigo-600 font-black text-lg">
                        <i data-lucide="trophy" class="w-5 h-5 text-yellow-500"></i>
                        <span id="score">0</span>
                    </div>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">คอมโบ</span>
                    <div class="flex items-center space-x-1 text-orange-500 font-black text-lg">
                        <i data-lucide="flame" id="flame-icon" class="w-5 h-5"></i>
                        <span id="streak">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- การ์ดโจทย์คำถาม -->
        <div class="w-full bg-white rounded-3xl shadow-xl overflow-hidden relative z-10">
            <div class="bg-indigo-600 p-8 flex flex-col items-center justify-center relative min-h-[200px] overflow-hidden">
                
                <!-- แถบเวลา (Progress Bar) -->
                <div id="timer-container" class="absolute top-0 left-0 w-full h-1.5 bg-indigo-800 force-hidden">
                    <div id="timer-bar" class="h-full bg-yellow-400" style="width: 100%;"></div>
                </div>

                <!-- ป้ายแสดงเวลาที่เหลือ -->
                <div id="timer-text-container" class="absolute top-4 right-4 bg-indigo-800 bg-opacity-50 text-yellow-300 px-3 py-1 rounded-full text-sm font-bold flex items-center space-x-1 shadow-inner force-hidden">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    <span id="timer-text">5</span>s
                </div>

                <!-- ปรับแต่งขนาดฟอนต์ และเพิ่ม whitespace-nowrap ให้อยู่บรรทัดเดียว -->
                <div id="question-text" class="text-3xl sm:text-4xl md:text-5xl font-black text-white tracking-wide font-mono text-center w-full mt-4 whitespace-nowrap">
                    กำลังโหลด...
                </div>
                
                <!-- ป้ายแสดงผลลัพธ์ Correct/Incorrect/Timeout -->
                <div id="overlay" class="force-hidden absolute inset-0 flex items-center justify-center bg-opacity-90 backdrop-blur-sm transition-all duration-300 z-20">
                    <div class="text-center transform scale-110 animate-bounce">
                        <div id="overlay-icon"></div>
                        <span id="overlay-text" class="text-3xl font-bold text-white px-4 text-center block"></span>
                    </div>
                </div>
            </div>

            <!-- ปุ่มตัวเลือก -->
            <div id="options-container" class="p-6 grid grid-cols-2 gap-4">
                <!-- ปุ่มจะถูกสร้างที่นี่ด้วย JavaScript -->
            </div>
        </div>

        <!-- ปุ่มรีเซ็ต (เผื่ออยากออกกลางคัน) -->
        <div class="w-full mt-6 flex justify-end items-center text-slate-500 text-sm relative z-10 px-2">
            <button onclick="backToSettings()" class="flex items-center space-x-1 hover:text-red-500 transition-colors bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>ออกจากการเล่น</span>
            </button>
        </div>
    </div>

    <!-- 3. หน้าสรุปคะแนนตอนจบ (ซ่อนไว้ก่อน) -->
    <div id="summary-screen" class="force-hidden w-full max-w-md bg-white rounded-3xl shadow-xl p-8 flex-col items-center space-y-6">
        <div class="text-center w-full">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 text-indigo-500 rounded-full mb-4 shadow-inner">
                <i data-lucide="award" class="w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 mb-1">สรุปผลคะแนน</h1>
            <p id="summary-message" class="text-lg font-bold text-indigo-500 mb-6">สมบูรณ์แบบ! เก่งมากๆ เลย 🎉</p>
        </div>

        <div class="w-full bg-slate-50 rounded-2xl p-6 border-2 border-slate-100 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-200 pb-4">
                <span class="text-slate-500 font-bold">คะแนนที่ได้</span>
                <div class="flex items-center space-x-2">
                    <span id="final-score" class="text-4xl font-black text-indigo-600">0</span>
                    <span class="text-slate-400 font-bold text-xl">/ 10</span>
                </div>
            </div>
            <div class="flex justify-between items-center pt-2">
                <span class="text-slate-500 font-bold">คอมโบสูงสุด</span>
                <div class="flex items-center space-x-1 text-orange-500">
                    <i data-lucide="flame" class="w-5 h-5"></i>
                    <span id="final-max-streak" class="text-xl font-bold">0</span>
                </div>
            </div>
        </div>

        <div class="w-full grid grid-cols-2 gap-4 mt-8">
            <button onclick="backToSettings()" class="w-full bg-slate-100 border-2 border-slate-200 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-all flex justify-center items-center space-x-2">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>ตั้งค่าใหม่</span>
            </button>
            <button onclick="startGame()" class="w-full bg-indigo-500 border-2 border-indigo-500 text-white py-3 rounded-xl font-bold hover:bg-indigo-600 transition-all flex justify-center items-center space-x-2 shadow-md">
                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                <span>เล่นอีกครั้ง</span>
            </button>
        </div>
    </div>

    <script>
        // เริ่มต้นการเรนเดอร์ไอคอน Lucide
        lucide.createIcons();

        // ตัวแปรสถานะเกม
        const MAX_QUESTIONS = 10;
        let questionCount = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let currentQuestion = null;
        let animating = false;
        
        // ตัวแปรจับเวลา
        let selectedTimeLimit = 5; 
        let timeLeft = 0;
        let timerInterval = null;

        // อ้างอิง HTML Elements พื้นฐาน
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const questionCounterEl = document.getElementById('question-counter');
        const flameIcon = document.getElementById('flame-icon');
        const questionTextEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const overlay = document.getElementById('overlay');
        const overlayIcon = document.getElementById('overlay-icon');
        const overlayText = document.getElementById('overlay-text');

        // ฟังก์ชันสุ่มตัวเลข
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // สลับหน้าจอ (แก้บั๊กกดไม่ได้ด้วย Force Hidden)
        function switchScreen(screenId) {
            document.getElementById('settings-screen').classList.add('force-hidden');
            document.getElementById('game-screen').classList.add('force-hidden');
            document.getElementById('summary-screen').classList.add('force-hidden');
            
            document.getElementById(screenId).classList.remove('force-hidden');
            
            // เพิ่ม/ลบ คลาส flex ให้ถูกต้องสำหรับเกมและสรุปผล
            if(screenId === 'game-screen' || screenId === 'summary-screen') {
                document.getElementById(screenId).style.display = 'flex';
            } else {
                document.getElementById(screenId).style.display = 'block';
            }
        }

        // ฟังก์ชันเลือกเวลาในหน้าตั้งค่า
        function selectTime(time, btnId) {
            selectedTimeLimit = time;
            
            // รีเซ็ตสไตล์ปุ่มทั้งหมด
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.className = "time-btn w-full bg-slate-50 border-2 border-slate-200 text-slate-600 py-3 rounded-xl font-bold hover:bg-indigo-50 transition-all";
            });
            
            // ไฮไลต์ปุ่มที่ถูกเลือก
            document.getElementById(btnId).className = "time-btn w-full bg-indigo-100 border-2 border-indigo-500 text-indigo-700 ring-2 ring-indigo-200 py-3 rounded-xl font-bold transition-all transform scale-105";
        }

        // ฟังก์ชันเริ่มเกม
        function startGame() {
            switchScreen('game-screen');
            
            // รีเซ็ตสถานะทั้งหมด
            score = 0;
            streak = 0;
            maxStreak = 0;
            questionCount = 0;
            updateUI();
            generateQuestion();
        }

        // ฟังก์ชันกลับไปหน้าตั้งค่า
        function backToSettings() {
            clearInterval(timerInterval);
            switchScreen('settings-screen');
        }

        // หน้าจอสรุปคะแนน
        function showSummaryScreen() {
            switchScreen('summary-screen');
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-max-streak').textContent = maxStreak;
            
            const messageEl = document.getElementById('summary-message');
            if (score === 10) {
                messageEl.textContent = "สมบูรณ์แบบ! เก่งมากๆ เลย 🎉";
                messageEl.className = "text-lg font-bold text-green-500 mb-6";
            } else if (score >= 7) {
                messageEl.textContent = "ทำได้ดีมาก! พยายามอีกนิดนะ 🌟";
                messageEl.className = "text-lg font-bold text-indigo-500 mb-6";
            } else if (score >= 5) {
                messageEl.textContent = "ผ่านเกณฑ์! ฝึกอีกหน่อยจะแม่นขึ้น 👍";
                messageEl.className = "text-lg font-bold text-orange-500 mb-6";
            } else {
                messageEl.textContent = "สู้ๆ นะ! ลองฝึกฝนดูอีกครั้ง 💪";
                messageEl.className = "text-lg font-bold text-slate-500 mb-6";
            }
        }

        // ฟังก์ชันอัปเดตหน้าจอหลัก (คะแนน)
        function updateUI() {
            scoreEl.textContent = score;
            streakEl.textContent = streak;

            if (streak > 2) {
                flameIcon.classList.add('animate-pulse', 'text-red-500');
            } else {
                flameIcon.classList.remove('animate-pulse', 'text-red-500');
            }
        }

        // ระบบควบคุมเวลา
        function startTimer() {
            clearInterval(timerInterval);
            const timerContainer = document.getElementById('timer-container');
            const timerTextContainer = document.getElementById('timer-text-container');
            const timerBar = document.getElementById('timer-bar');
            const timerText = document.getElementById('timer-text');

            if (selectedTimeLimit === 0) {
                timerContainer.classList.add('force-hidden');
                timerTextContainer.classList.add('force-hidden');
                return;
            }

            timerContainer.classList.remove('force-hidden');
            timerTextContainer.classList.remove('force-hidden');
            
            timeLeft = selectedTimeLimit;
            
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            timerBar.classList.remove('bg-red-500');
            timerBar.classList.add('bg-yellow-400');
            
            timerText.textContent = timeLeft;
            timerTextContainer.classList.remove('text-red-400');
            timerTextContainer.classList.add('text-yellow-300');

            void timerBar.offsetWidth; // Force Reflow
            timerBar.style.transition = 'width 1s linear, background-color 0.3s ease';

            timerInterval = setInterval(() => {
                timeLeft--;
                const percent = (timeLeft / selectedTimeLimit) * 100;
                timerBar.style.width = `${percent}%`;
                timerText.textContent = timeLeft;

                if (timeLeft <= 3) {
                    timerBar.classList.remove('bg-yellow-400');
                    timerBar.classList.add('bg-red-500');
                    timerTextContainer.classList.remove('text-yellow-300');
                    timerTextContainer.classList.add('text-red-400');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function handleTimeout() {
            if (animating) return;
            animating = true;
            streak = 0; 
            updateUI();

            overlay.classList.remove('force-hidden', 'bg-green-500', 'bg-red-500');
            overlay.classList.add('bg-orange-500'); 
            overlayIcon.innerHTML = '<i data-lucide="clock" class="w-24 h-24 text-white mx-auto mb-2"></i>';
            overlayText.textContent = `หมดเวลา! คำตอบคือ ${currentQuestion.answer}`;
            lucide.createIcons();

            lockOptions(currentQuestion.answer);

            setTimeout(() => {
                moveToNextQuestion();
            }, 2000);
        }

        // ฟังก์ชันสร้างโจทย์ใหม่
        function generateQuestion() {
            questionCount++;
            questionCounterEl.textContent = `ข้อที่ ${questionCount} / ${MAX_QUESTIONS}`;

            animating = false;
            overlay.classList.add('force-hidden');
            overlay.classList.remove('bg-green-500', 'bg-red-500', 'bg-orange-500');

            let a = randomInt(-15, 15);
            let b = randomInt(-15, 15);
            const operator = Math.random() > 0.5 ? '+' : '-';
            const correctAnswer = operator === '+' ? a + b : a - b;

            const bString = b < 0 ? `(${b})` : `${b}`;
            const questionText = `${a} ${operator} ${bString} = ?`;

            const absA = Math.abs(a);
            const absB = Math.abs(b);
            const mistakes = [
                absA + absB, -(absA + absB), absA - absB, absB - absA,
                a + b, a - b, b - a, -a - b, -a + b
            ];

            let uniqueMistakes = [...new Set(mistakes)].filter(val => val !== correctAnswer);
            uniqueMistakes.sort(() => Math.random() - 0.5);

            let options = [correctAnswer, ...uniqueMistakes.slice(0, 3)];

            while (options.length < 4) {
                let randomFallback = correctAnswer + (Math.random() > 0.5 ? randomInt(1, 5) : randomInt(-5, -1));
                if (!options.includes(randomFallback)) options.push(randomFallback);
            }

            options.sort(() => Math.random() - 0.5);

            currentQuestion = {
                text: questionText,
                answer: correctAnswer,
                options: options
            };

            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            questionTextEl.textContent = currentQuestion.text;
            optionsContainer.innerHTML = ''; 

            currentQuestion.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = "text-3xl font-bold py-6 rounded-2xl transition-all duration-200 transform hover:-translate-y-1 hover:shadow-md active:scale-95 bg-slate-50 hover:bg-indigo-50 border-2 border-slate-200 hover:border-indigo-300 text-slate-700";
                btn.textContent = option;
                btn.onclick = () => handleOptionClick(option, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function handleOptionClick(selectedOption, clickedBtn) {
            if (animating) return;
            animating = true;
            clearInterval(timerInterval);

            const isCorrect = selectedOption === currentQuestion.answer;

            if (isCorrect) {
                score++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
            } else {
                streak = 0;
            }
            updateUI();

            overlay.classList.remove('force-hidden', 'bg-orange-500');
            if (isCorrect) {
                overlay.classList.add('bg-green-500');
                overlayIcon.innerHTML = '<i data-lucide="check" class="w-24 h-24 text-white mx-auto mb-2"></i>';
                overlayText.textContent = "ถูกต้อง! เยี่ยมมาก";
            } else {
                overlay.classList.add('bg-red-500');
                overlayIcon.innerHTML = '<i data-lucide="x" class="w-24 h-24 text-white mx-auto mb-2"></i>';
                overlayText.textContent = `ผิดจ้า คำตอบคือ ${currentQuestion.answer}`;
            }
            lucide.createIcons();

            lockOptions(currentQuestion.answer, clickedBtn);

            setTimeout(() => {
                moveToNextQuestion();
            }, 1500);
        }

        // ล็อกตัวเลือกหลังจากตอบหรือหมดเวลา พร้อมเปลี่ยนสีเฉลย
        function lockOptions(correctAnswer, clickedBtn = null) {
            Array.from(optionsContainer.children).forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('hover:-translate-y-1', 'hover:shadow-md', 'active:scale-95', 'hover:bg-indigo-50', 'hover:border-indigo-300');
                
                const btnValue = parseInt(btn.textContent);
                
                if (btnValue === correctAnswer) {
                    btn.className = "text-3xl font-bold py-6 rounded-2xl transition-all duration-200 bg-green-100 border-2 border-green-500 text-green-700 shadow-md";
                } else if (btn === clickedBtn) {
                    btn.className = "text-3xl font-bold py-6 rounded-2xl transition-all duration-200 bg-red-100 border-2 border-red-500 text-red-700 shadow-inner opacity-80";
                } else {
                    btn.className = "text-3xl font-bold py-6 rounded-2xl transition-all duration-200 bg-slate-50 border-2 border-slate-100 text-slate-400 opacity-50";
                }
            });
        }

        // ตรวจสอบว่าครบ 10 ข้อหรือยัง ถ้าครบให้ไปหน้าสรุป
        function moveToNextQuestion() {
            if (questionCount >= MAX_QUESTIONS) {
                showSummaryScreen();
            } else {
                generateQuestion();
            }
        }

    </script>
</body>
</html>
